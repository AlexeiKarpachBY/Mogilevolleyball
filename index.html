<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание волейбольной лиги</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Подключение стилей -->
    <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>
    <div class="container">
        <h1><span class="volleyball">🏐</span> Могилевская любительская волейбольная лига</h1>

        <!-- Кнопки режимов просмотра -->
        <div class="view-modes">
            <button class="view-mode-btn active" data-mode="gameweek">📅 Расписание</button>
            <button class="view-mode-btn" data-mode="team">👥 По командам</button>
            <button class="view-mode-btn" data-mode="table">🏆 Таблица</button>
            <button class="view-mode-btn" data-mode="playoff">⚔️ Плей-офф</button>
        </div>

        <div class="controls">
            <div class="control-group" id="gameweekSelector">
                <label>🗓️ Выберите тур:</label>
                <select id="gameweekSelect">
                    <option value="">Загрузка...</option>
                </select>
            </div>

            <div class="control-group" id="teamSelector" style="display: none;">
                <label>👥 Выберите команду:</label>
                <select id="teamSelect">
                    <option value="">Загрузка...</option>
                </select>
            </div>

            <div class="control-group" id="homeAwayFilter" style="display: none;">
                <label>🏠 Фильтр игр:</label>
                <select id="homeAwaySelect">
                    <option value="all">Все игры</option>
                    <option value="home">Только дома</option>
                    <option value="away">Только в гостях</option>
                </select>
            </div>

            <div class="control-group" id="teamCardSelector" style="display: none;">
                <label>🏐 Карточка команды:</label>
                <select id="teamCardSelect">
                    <option value="">Выберите команду...</option>
                </select>
            </div>
        </div>

        <div class="legend" id="legend">
            <div class="legend-item">
                <span class="home-badge">ДОМА</span>
                <span>Домашняя игра</span>
            </div>
            <div class="legend-item">
                <span class="away-badge">ГОСТИ</span>
                <span>Выездная игра</span>
            </div>
        </div>

        <div class="schedule-container" id="scheduleContainer">
            <div class="no-matches">Выберите тур или команду для просмотра расписания</div>
        </div>
    </div>

    <!-- Подключение скриптов -->
    <script src="js/scheduleData.js?v=2"></script>
    <script src="js/matchResults.js?v=2"></script>
    <script src="js/standings.js?v=2"></script>
    <script src="js/teamCard.js?v=2"></script>
    <script src="js/playoff.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
</body>
</html>
